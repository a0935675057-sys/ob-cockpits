<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組織行為學 ‧ 第二章 教學駕駛艙</title>
<style>
:root{
  --board:#22352e;
  --board2:#1b2a25;
  --frame:#6b4a2b;
  --frame2:#4f3620;
  --chalk:#f4f1e6;
  --chalk-dim:#cdd3c8;
  --yellow:#ffe39f;
  --pink:#ff9ebb;
  --blue:#a7d8ff;
  --green:#b6f0a8;
  --orange:#ffc38a;
  --ink:#0f1714;
  --pen:'Segoe Print','Bradley Hand','Comic Sans MS','cursive';
  --body:'Segoe UI','Microsoft JhengHei',system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--body);
  background:#14201c;
  color:var(--chalk);
  overflow:hidden;
}
/* ===== chalk texture filters ===== */
.chalk-font{font-family:var(--pen);}
h1,h2,h3,.chalk-h{font-family:var(--pen);letter-spacing:.5px;}

/* ===== app frame ===== */
#app{
  height:100vh;display:flex;flex-direction:column;
  padding:10px;gap:0;
  background:
    repeating-linear-gradient(90deg,var(--frame) 0 14px,var(--frame2) 14px 28px);
  border-radius:8px;
}
.board{
  flex:1;min-height:0;display:flex;flex-direction:column;
  border-radius:10px;
  background:
    radial-gradient(120% 140% at 12% 8%, #2c4239 0%, var(--board) 42%, var(--board2) 100%);
  box-shadow:inset 0 0 0 3px #14201c, inset 0 0 60px rgba(0,0,0,.55), 0 10px 30px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
}
.board::before{ /* chalk dust noise */
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.06;
  background-image:radial-gradient(rgba(255,255,255,.7) 1px,transparent 1px);
  background-size:5px 5px;mix-blend-mode:screen;
}
.board::after{ /* faint erase smudges */
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.05;
  background:
    radial-gradient(60% 30% at 70% 20%,#fff,transparent 60%),
    radial-gradient(40% 25% at 20% 75%,#fff,transparent 60%);
  mix-blend-mode:screen;
}

/* ===== top bar ===== */
.topbar{
  display:flex;align-items:center;gap:18px;
  padding:12px 20px;border-bottom:2px dashed rgba(244,241,230,.25);
  position:relative;z-index:6;
}
.brand{display:flex;flex-direction:column;line-height:1.05;}
.brand .k{font-family:var(--pen);font-size:24px;color:var(--chalk);text-shadow:0 0 1px rgba(255,255,255,.4);}
.brand .s{font-size:12px;color:var(--chalk-dim);letter-spacing:3px;}
.spacer{flex:1;}
.progress-wrap{display:flex;align-items:center;gap:8px;color:var(--chalk-dim);font-size:13px;}
.progress-bar{width:130px;height:8px;border-radius:8px;background:rgba(0,0,0,.3);overflow:hidden;border:1px solid rgba(244,241,230,.2);}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .4s;}

/* mode toggle */
.mode-toggle{display:flex;align-items:center;gap:10px;font-family:var(--pen);font-size:15px;}
.switch{
  --on:var(--yellow);
  position:relative;width:118px;height:34px;border-radius:30px;cursor:pointer;
  background:rgba(0,0,0,.35);border:2px solid rgba(244,241,230,.3);
  display:flex;align-items:center;user-select:none;
}
.switch .knob{
  position:absolute;top:2px;left:2px;width:56px;height:26px;border-radius:24px;
  background:linear-gradient(180deg,#fff,#d8d4c4);color:#22352e;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  transition:left .25s cubic-bezier(.5,1.6,.5,1);box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.switch .lab{flex:1;text-align:center;font-size:12px;color:var(--chalk-dim);z-index:1;}
body[data-mode="student"] .switch .knob{left:60px;}
body[data-mode="student"] .switch{--on:var(--blue);}

/* ===== layout ===== */
.workspace{flex:1;min-height:0;display:flex;position:relative;z-index:2;}
.sidebar{
  width:226px;flex-shrink:0;padding:16px 12px;overflow-y:auto;
  border-right:2px dashed rgba(244,241,230,.22);
}
.sidebar h4{font-family:var(--pen);font-size:14px;color:var(--yellow);margin:0 0 12px 6px;}
.tp-btn{
  display:block;width:100%;text-align:left;cursor:pointer;
  background:transparent;border:2px solid transparent;border-radius:12px;
  color:var(--chalk-dim);padding:10px 12px;margin-bottom:8px;transition:.18s;
}
.tp-btn:hover{border-color:rgba(244,241,230,.25);color:var(--chalk);}
.tp-btn.active{
  border-color:var(--yellow);color:var(--chalk);
  background:rgba(255,227,159,.08);box-shadow:inset 0 0 14px rgba(255,227,159,.07);
}
.tp-btn .no{font-family:var(--pen);font-size:20px;color:var(--yellow);margin-right:4px;}
.tp-btn.active .no{color:var(--yellow);}
.tp-btn .t{font-family:var(--pen);font-size:15px;display:block;margin-top:2px;}
.tp-btn .d{font-size:11px;opacity:.7;display:block;margin-top:2px;}
.tp-check{float:right;color:var(--green);font-family:var(--pen);}

/* ===== main stage ===== */
.stage{flex:1;min-width:0;display:flex;flex-direction:column;padding:14px 22px 10px;overflow:hidden;}
.stage-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;}
.stage-head .tno{font-family:var(--pen);font-size:34px;color:var(--yellow);line-height:1;}
.stage-head .ttitle{font-family:var(--pen);font-size:26px;}
.stage-obj{font-size:13px;color:var(--chalk-dim);margin-bottom:10px;border-left:3px solid var(--green);padding-left:10px;}
.stage-obj b{color:var(--green);font-family:var(--pen);}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.tab{
  font-family:var(--pen);font-size:15px;cursor:pointer;
  padding:7px 16px;border-radius:12px 12px 4px 12px;
  background:rgba(0,0,0,.22);color:var(--chalk-dim);
  border:2px solid rgba(244,241,230,.18);transition:.15s;
}
.tab:hover{color:var(--chalk);}
.tab.active{background:rgba(167,216,255,.12);border-color:var(--blue);color:var(--chalk);}
.tab .ic{margin-right:6px;}

.panes{flex:1;min-height:0;position:relative;}
.pane{position:absolute;inset:0;overflow:auto;display:none;animation:fade .3s;}
.pane.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ===== carousel ===== */
.carousel{display:flex;flex-direction:column;height:100%;}
.slide-stage{
  flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.28);border-radius:12px;border:2px solid rgba(244,241,230,.16);
  overflow:hidden;
}
.slide-stage img{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 6px 22px rgba(0,0,0,.5);}
.nav-arrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:3;cursor:pointer;
  width:46px;height:46px;border-radius:50%;border:2px solid rgba(244,241,230,.4);
  background:rgba(20,32,28,.7);color:var(--chalk);font-size:22px;font-family:var(--pen);
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.nav-arrow:hover{background:var(--yellow);color:#22352e;border-color:var(--yellow);}
.nav-arrow.prev{left:12px;} .nav-arrow.next{right:12px;}
.carousel-bar{display:flex;align-items:center;gap:14px;padding:8px 4px 2px;}
.dots{display:flex;gap:7px;flex:1;justify-content:center;flex-wrap:wrap;}
.dot{width:11px;height:11px;border-radius:50%;background:rgba(244,241,230,.25);cursor:pointer;transition:.15s;}
.dot.active{background:var(--yellow);transform:scale(1.25);}
.slide-count{font-family:var(--pen);font-size:15px;color:var(--chalk-dim);min-width:54px;}
.teach-note{
  margin-top:8px;background:rgba(182,240,168,.08);border:2px dashed rgba(182,240,168,.4);
  border-radius:10px;padding:8px 14px;font-size:13px;color:var(--chalk);
}
.teach-note b{font-family:var(--pen);color:var(--green);}

/* ===== video pane ===== */
.video-wrap{height:100%;display:flex;flex-direction:column;}
.video-stage{flex:1;min-height:0;border-radius:12px;overflow:hidden;border:2px solid rgba(244,241,230,.16);background:#000;position:relative;}
.video-stage iframe{width:100%;height:100%;border:0;display:block;}
.video-poster{width:100%;height:100%;cursor:pointer;position:relative;background-size:cover;background-position:center;}
.video-poster .play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:84px;height:84px;border-radius:50%;background:rgba(255,158,187,.92);
  display:flex;align-items:center;justify-content:center;font-size:34px;color:#22352e;
  box-shadow:0 6px 22px rgba(0,0,0,.5);transition:.15s;
}
.video-poster:hover .play{transform:translate(-50%,-50%) scale(1.1);background:var(--pink);}
.video-poster .pl-cap{position:absolute;left:0;right:0;bottom:0;padding:10px 14px;font-family:var(--pen);font-size:15px;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.7));}
.video-bar{display:flex;align-items:center;gap:8px;padding:10px 2px 2px;flex-wrap:wrap;}
.video-bar input{
  flex:1;min-width:220px;background:rgba(0,0,0,.3);border:2px solid rgba(244,241,230,.25);
  border-radius:10px;color:var(--chalk);font-family:var(--body);font-size:13px;padding:8px 12px;
}
.video-bar input::placeholder{color:rgba(244,241,230,.4);}
.video-cap{font-family:var(--pen);font-size:14px;color:var(--orange);}
.video-placeholder{
  flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  border-radius:12px;border:2px dashed rgba(255,195,138,.5);background:rgba(255,195,138,.06);text-align:center;padding:24px;
}
.video-placeholder .vp-ic{font-size:54px;opacity:.8;}
.video-placeholder .vp-t{font-family:var(--pen);font-size:22px;color:var(--orange);}
.video-placeholder .vp-d{font-size:13px;color:var(--chalk-dim);max-width:440px;line-height:1.6;}

/* ===== infographic pane ===== */
.info-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.info-wrap img{max-width:100%;max-height:84%;border-radius:10px;border:3px solid var(--frame2);box-shadow:0 8px 26px rgba(0,0,0,.55);cursor:zoom-in;}
.info-cap{font-family:var(--pen);font-size:16px;color:var(--yellow);}

/* ===== interactive shared ===== */
.iv{height:100%;overflow:auto;padding:4px 6px;}
.iv-title{font-family:var(--pen);font-size:19px;color:var(--blue);margin:0 0 4px;}
.iv-sub{font-size:13px;color:var(--chalk-dim);margin-bottom:12px;}
.chalk-card{
  background:rgba(0,0,0,.2);border:2px solid rgba(244,241,230,.2);border-radius:14px;padding:14px 16px;margin-bottom:12px;
}
.btn{
  font-family:var(--pen);font-size:15px;cursor:pointer;padding:7px 18px;border-radius:12px;
  background:rgba(167,216,255,.12);border:2px solid var(--blue);color:var(--chalk);transition:.15s;
}
.btn:hover{background:var(--blue);color:#22352e;}
.btn.y{border-color:var(--yellow);background:rgba(255,227,159,.12);}
.btn.y:hover{background:var(--yellow);color:#22352e;}
.btn.g{border-color:var(--green);background:rgba(182,240,168,.12);}
.btn.g:hover{background:var(--green);color:#22352e;}
.btn.sm{font-size:13px;padding:5px 12px;}

/* myth buster */
.mb-item{margin-bottom:10px;}
.mb-q{font-size:15px;margin-bottom:8px;}
.mb-q .qn{font-family:var(--pen);color:var(--yellow);margin-right:6px;}
.mb-actions{display:flex;gap:8px;margin-bottom:6px;}
.mb-reveal{display:none;font-size:13px;border-left:3px solid var(--green);padding:6px 10px;background:rgba(0,0,0,.2);border-radius:0 8px 8px 0;}
.mb-reveal.show{display:block;}
.mb-reveal .verdict{font-family:var(--pen);font-size:15px;}
.mb-reveal .myth{color:var(--pink);} .mb-reveal .fact{color:var(--green);}
.pick.right{background:var(--green)!important;color:#22352e!important;border-color:var(--green)!important;}
.pick.wrong{background:var(--pink)!important;color:#22352e!important;border-color:var(--pink)!important;}

/* classifier */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.chip{
  font-size:13px;padding:7px 12px;border-radius:20px;cursor:pointer;
  background:rgba(244,241,230,.08);border:2px solid rgba(244,241,230,.3);color:var(--chalk);transition:.12s;
}
.chip:hover{border-color:var(--yellow);}
.chip.sel{background:var(--yellow);color:#22352e;border-color:var(--yellow);transform:scale(1.05);}
.chip.placed{opacity:.35;pointer-events:none;text-decoration:line-through;}
.buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.bucket{min-height:120px;background:rgba(0,0,0,.2);border:2px dashed rgba(244,241,230,.3);border-radius:14px;padding:10px;cursor:pointer;transition:.15s;}
.bucket:hover{border-color:var(--blue);}
.bucket h5{font-family:var(--pen);font-size:16px;margin:0 0 8px;text-align:center;}
.bucket .placed-chip{font-size:12px;padding:5px 9px;border-radius:14px;margin:3px;display:inline-block;background:rgba(244,241,230,.12);border:1px solid rgba(244,241,230,.3);}
.bucket .placed-chip.ok{border-color:var(--green);color:var(--green);}
.bucket .placed-chip.no{border-color:var(--pink);color:var(--pink);}

/* contingency simulator */
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
.sim-controls .ctrl{margin-bottom:16px;}
.sim-controls label{font-family:var(--pen);font-size:15px;color:var(--yellow);display:block;margin-bottom:8px;}
.seg{display:flex;gap:0;border:2px solid rgba(244,241,230,.3);border-radius:12px;overflow:hidden;}
.seg button{flex:1;background:transparent;border:none;color:var(--chalk-dim);font-family:var(--pen);font-size:14px;padding:9px;cursor:pointer;transition:.15s;}
.seg button.on{background:var(--blue);color:#22352e;}
.sim-out{background:rgba(0,0,0,.25);border:2px solid rgba(244,241,230,.2);border-radius:14px;padding:16px;min-height:200px;display:flex;flex-direction:column;}
.flow-eq{font-family:var(--pen);font-size:17px;text-align:center;margin-bottom:14px;}
.flow-eq .x{color:var(--blue);} .flow-eq .z{color:var(--yellow);} .flow-eq .y{color:var(--green);}
.outcome-box{flex:1;border-radius:12px;padding:14px;display:flex;flex-direction:column;justify-content:center;text-align:center;transition:.3s;}
.outcome-box.good{background:rgba(182,240,168,.14);border:2px solid var(--green);}
.outcome-box.bad{background:rgba(255,158,187,.14);border:2px solid var(--pink);}
.outcome-box .oh{font-family:var(--pen);font-size:20px;margin-bottom:6px;}
.outcome-box.good .oh{color:var(--green);} .outcome-box.bad .oh{color:var(--pink);}
.outcome-box .od{font-size:13px;color:var(--chalk);}

/* OB engine */
.engine{display:grid;grid-template-columns:120px 1fr 1fr 1fr;gap:8px;}
.engine .eh{font-family:var(--pen);font-size:15px;color:var(--orange);text-align:center;padding:6px;}
.engine .lvl{font-family:var(--pen);font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(0,0,0,.25);cursor:pointer;border:2px solid rgba(244,241,230,.2);padding:8px;transition:.15s;}
.engine .lvl:hover{border-color:var(--yellow);}
.engine .cell{border-radius:10px;background:rgba(0,0,0,.18);border:2px solid rgba(244,241,230,.14);padding:10px;font-size:12px;text-align:center;opacity:.32;transition:.3s;}
.engine-row.lit .cell{opacity:1;}
.engine-row.lit .lvl{border-color:var(--yellow);background:rgba(255,227,159,.1);}
.engine-row .cell.inp{border-color:var(--blue);} .engine-row .cell.prc{border-color:var(--yellow);} .engine-row .cell.out{border-color:var(--green);}
.engine-hint{font-size:13px;color:var(--chalk-dim);margin-top:12px;text-align:center;}

/* ===== assessment ===== */
.quiz{height:100%;overflow:auto;padding:2px 6px;}
.quiz-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.quiz-head .qt{font-family:var(--pen);font-size:18px;color:var(--orange);}
.score-pill{font-family:var(--pen);font-size:15px;padding:4px 14px;border-radius:20px;border:2px solid var(--green);color:var(--green);display:none;}
.score-pill.show{display:inline-block;}
.q{background:rgba(0,0,0,.2);border:2px solid rgba(244,241,230,.18);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.q .stem{font-size:15px;margin-bottom:10px;}
.q .stem .qn{font-family:var(--pen);color:var(--orange);margin-right:6px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{
  text-align:left;cursor:pointer;padding:9px 13px;border-radius:10px;font-size:14px;
  background:rgba(244,241,230,.05);border:2px solid rgba(244,241,230,.2);color:var(--chalk);transition:.12s;
}
.opt:hover{border-color:var(--yellow);}
.opt.sel{border-color:var(--blue);background:rgba(167,216,255,.12);}
.opt.correct{border-color:var(--green);background:rgba(182,240,168,.16);}
.opt.incorrect{border-color:var(--pink);background:rgba(255,158,187,.14);}
.opt .mk{font-family:var(--pen);margin-right:8px;color:var(--yellow);}
.q-exp{display:none;margin-top:10px;font-size:13px;border-left:3px solid var(--green);padding:6px 10px;background:rgba(0,0,0,.2);border-radius:0 8px 8px 0;}
.q-exp.show{display:block;}
.q-exp b{font-family:var(--pen);color:var(--green);}
.quiz-actions{display:flex;gap:10px;margin:6px 0 20px;}

/* ===== floating tool panel ===== */
.tool-rail{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:30;
  display:flex;flex-direction:column;gap:10px;
}
.tool-btn{
  width:54px;height:54px;border-radius:16px;cursor:pointer;font-size:24px;
  background:linear-gradient(180deg,#33473d,#22352e);border:2px solid rgba(244,241,230,.35);
  color:var(--chalk);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.5);transition:.15s;position:relative;
}
.tool-btn:hover{border-color:var(--yellow);transform:translateX(-4px);}
.tool-btn.active{border-color:var(--yellow);background:rgba(255,227,159,.18);}
.tool-btn .tip{
  position:absolute;right:64px;top:50%;transform:translateY(-50%);white-space:nowrap;
  font-family:var(--pen);font-size:14px;background:rgba(15,23,20,.92);padding:4px 10px;border-radius:8px;
  border:1px solid rgba(244,241,230,.3);opacity:0;pointer-events:none;transition:.15s;
}
.tool-btn:hover .tip{opacity:1;}

.tool-popup{
  position:absolute;z-index:40;width:300px;
  background:linear-gradient(180deg,#2b3f37,#1f302a);border:2px solid var(--yellow);border-radius:16px;
  box-shadow:0 16px 44px rgba(0,0,0,.6);padding:0;display:none;
}
.tool-popup.show{display:block;}
.tool-popup .ph{
  display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  border-bottom:2px dashed rgba(244,241,230,.25);cursor:move;font-family:var(--pen);font-size:16px;color:var(--yellow);
}
.tool-popup .pc{padding:14px;}
.tool-popup .x{cursor:pointer;font-size:18px;color:var(--chalk-dim);border:none;background:none;}
.tool-popup .x:hover{color:var(--pink);}

/* picker */
#pickResult{font-family:var(--pen);font-size:38px;text-align:center;color:var(--yellow);min-height:54px;margin:10px 0;}
#pickResult.rolling{color:var(--blue);}
textarea.names{width:100%;height:90px;background:rgba(0,0,0,.3);border:2px solid rgba(244,241,230,.25);border-radius:10px;color:var(--chalk);font-family:var(--body);font-size:13px;padding:8px;resize:vertical;}
.row{display:flex;gap:8px;align-items:center;margin-top:10px;}
.history{font-size:12px;color:var(--chalk-dim);margin-top:8px;min-height:18px;}

/* timer */
#timerDisplay{font-family:var(--pen);font-size:54px;text-align:center;color:var(--green);margin:6px 0;letter-spacing:2px;}
#timerDisplay.warn{color:var(--orange);}
#timerDisplay.done{color:var(--pink);animation:blink .6s steps(2) infinite;}
@keyframes blink{50%{opacity:.25;}}
.presets{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;}
.preset{font-family:var(--pen);font-size:14px;padding:5px 12px;border-radius:10px;cursor:pointer;background:rgba(0,0,0,.25);border:2px solid rgba(244,241,230,.25);color:var(--chalk);}
.preset:hover{border-color:var(--green);}

/* pen palette */
.pen-palette{
  position:absolute;z-index:45;left:50%;bottom:18px;transform:translateX(-50%);
  display:none;align-items:center;gap:10px;padding:10px 16px;border-radius:30px;
  background:rgba(15,23,20,.94);border:2px solid var(--yellow);box-shadow:0 10px 30px rgba(0,0,0,.6);
}
.pen-palette.show{display:flex;}

/* ---- teaching video ---- */
function ytId(url){
  if(!url)return null;
  url=url.trim();
  let m;
  if(m=url.match(/[?&]v=([\w-]{6,})/))return m[1];
  if(m=url.match(/youtu\.be\/([\w-]{6,})/))return m[1];
  if(m=url.match(/youtube\.com\/(?:embed|shorts|live)\/([\w-]{6,})/))return m[1];
  if(/^[\w-]{6,}$/.test(url))return url; // bare id
  return null;
}
function videoUrlFor(no){
  return localStorage.getItem('ob_ch1_video_'+no) || VIDEOS[no] || '';
}
function isLocalVideo(url){
  return !!url && /\.(mp4|webm|ogg|ogv|mov|m4v)(\?.*)?$/i.test(url.trim()) && !/youtu/i.test(url);
}
function renderVideo(){
  const tp=TP[curTP], pane=document.querySelector('.pane[data-pane="video"]');
  const url=videoUrlFor(tp.no);
  const id=ytId(url);
  let stage;
  if(isLocalVideo(url)){
    // 本地影片檔：用原生播放器，100% 在駕駛艙內播放、完全不連 YouTube
    stage=`<div class="video-stage">
       <video controls preload="metadata" playsinline src="${url.replace(/"/g,'&quot;')}" style="width:100%;height:100%;background:#000;"></video>
     </div>`;
  } else if(id){
    // lazy: show thumbnail + play button; load iframe only on click
    stage=`<div class="video-stage">
       <div class="video-poster" id="vidPoster" data-id="${id}" style="background-image:url('https://img.youtube.com/vi/${id}/hqdefault.jpg')">
         <div class="play">▶</div>
         <div class="pl-cap">▶ 點擊在此就地播放（不離開駕駛艙）</div>
       </div></div>`;
  } else {
    stage=`<div class="video-placeholder">
       <div class="vp-ic">📺</div>
       <div class="vp-t">貼上你的 YouTube 網址，或輸入本地影片檔名</div>
       <div class="vp-d">① <b>YouTube</b>：貼上 https://youtu.be/… 連結 → 在頁面內嵌入播放。<br>
         ② <b>完全離線</b>：把影片 mp4 放進本資料夾，輸入檔名（例如 <b>myvideo.mp4</b>）→ 用原生播放器在駕駛艙內播放，不連 YouTube。<br>
         貼上 / 輸入後都會自動記住。</div>
     </div>`;
  }
  pane.innerHTML=`<div class="video-wrap">
     ${stage}
     <div class="video-bar">
       <span class="video-cap">📺 我的影片：</span>
       <input type="text" id="vidInput" placeholder="貼上 YouTube 網址，或輸入本地影片檔名 myvideo.mp4" value="${url.replace(/"/g,'&quot;')}">
       <button class="btn y sm" id="vidSet">嵌入</button>
       <button class="btn sm" id="vidClear">清除</button>
       <span class="video-cap" id="vidStatus"></span>
     </div>
   </div>`;
  const input=pane.querySelector('#vidInput');
  const status=pane.querySelector('#vidStatus');
  function valid(v){ return !!ytId(v) || isLocalVideo(v); }
  function save(v){
    v=(v||'').trim();
    if(v && !valid(v)){status.style.color='var(--pink)';status.textContent='⚠ 無法辨識，請貼 YouTube 網址或輸入影片檔名(.mp4)';return false;}
    if(v)localStorage.setItem('ob_ch1_video_'+tp.no,v); else localStorage.removeItem('ob_ch1_video_'+tp.no);
    return true;
  }
  pane.querySelector('#vidSet').onclick=()=>{ if(save(input.value))renderVideo(); };
  pane.querySelector('#vidClear').onclick=()=>{ localStorage.removeItem('ob_ch1_video_'+tp.no); input.value=''; renderVideo(); };
  input.onkeydown=e=>{ if(e.key==='Enter' && save(input.value))renderVideo(); };
  // 貼上 YouTube 網址後自動嵌入
  input.onpaste=()=>{ setTimeout(()=>{ const v=input.value.trim(); if(valid(v) && save(v))renderVideo(); },60); };
  // 點擊海報才載入 YouTube（延遲載入，畫面更快）
  const poster=pane.querySelector('#vidPoster');
  if(poster)poster.onclick=()=>{
    const vid=poster.dataset.id;
    poster.parentElement.innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${vid}?rel=0&autoplay=1&modestbranding=1&playsinline=1"
       title="教學影片" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
       allowfullscreen></iframe>`;
  };
}

  </div>`;
  const chipsEl=pane.querySelector('#clChips'), bkEl=pane.querySelector('#clBuckets');
  let selected=null;
  const placement={}; // itemIndex -> bucketIndex
  opts.items.forEach((it,i)=>{
    const c=document.createElement('span'); c.className='chip'; c.textContent=it.name; c.dataset.i=i;
    c.onclick=()=>{selected=i; chipsEl.querySelectorAll('.chip').forEach(x=>x.classList.toggle('sel',+x.dataset.i===i));};
    chipsEl.appendChild(c);
  });
  opts.cats.forEach((cat,ci)=>{
    const b=document.createElement('div'); b.className='bucket'; b.dataset.c=ci;
    b.innerHTML=`<h5>${cat}</h5><div class="bk-body"></div>`;
    b.onclick=()=>{
      if(selected===null)return;
      placement[selected]=ci;
      chipsEl.querySelector(`.chip[data-i="${selected}"]`).classList.add('placed');
      selected=null; chipsEl.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
      redraw();
    };
    bkEl.appendChild(b);
  });
  function redraw(){
    bkEl.querySelectorAll('.bucket').forEach(b=>{
      const body=b.querySelector('.bk-body'); body.innerHTML='';
      Object.entries(placement).forEach(([ii,ci])=>{
        if(+ci===+b.dataset.c){
          const it=opts.items[ii];
          const t=document.createElement('span'); t.className='placed-chip'; t.textContent=it.name;
          body.appendChild(t);
        }
      });
    });
  }
  pane.querySelector('#clCheck').onclick=()=>{
    let ok=0, total=opts.items.length;
    bkEl.querySelectorAll('.placed-chip').forEach(el=>el.classList.remove('ok','no'));
    bkEl.querySelectorAll('.bucket').forEach(b=>{
      const ci=+b.dataset.c;
      b.querySelectorAll('.placed-chip').forEach(el=>{
        const idx=opts.items.findIndex(x=>x.name===el.textContent);
        const correct=opts.items[idx].cat===ci;
        el.classList.add(correct?'ok':'no');
        if(opts.detail&&correct) el.textContent=el.textContent+' ‧ '+opts.detail(opts.items[idx]);
        if(correct)ok++;
      });
    });
    const placed=Object.keys(placement).length;
    pane.querySelector('#clMsg').textContent=`答對 ${ok} / ${total}（已放置 ${placed}）`;
    if(ok===total){pane.querySelector('#clMsg').textContent='🎉 全部正確！'; markDone(curTP);}
  };
  pane.querySelector('#clReset').onclick=()=>buildClassifier(pane,opts);
}

/* INTERACTIVE 4: contingency simulator */
function ivSim(pane){
  pane.innerHTML=`<div class="iv">
    <h3 class="iv-title">🧩 斷層線模擬器：團隊組成如何影響凝聚力</h3>
    <p class="iv-sub">同樣的團隊規模，結果 (Y) 會隨組成方式與情境條件改變。調整下列條件，觀察產出。</p>
    <div class="sim-grid">
      <div class="sim-controls">
        <div class="ctrl">
          <label>投入 X ‧ 團隊組成方式</label>
          <div class="seg" id="segX">
            <button data-v="0" class="on">深層斷層線排列（背景與職能高度重疊）</button>
            <button data-v="1">交叉編組（背景與角色交錯分布）</button>
          </div>
        </div>
        <div class="ctrl">
          <label>條件 Z ‧ 任務性質</label>
          <div class="seg" id="segZ">
            <button data-v="0" class="on">高複雜度、需要創新</button>
            <button data-v="1">低複雜度、重複性任務</button>
          </div>
        </div>
        <div class="ctrl">
          <label>條件 Z₂ ‧ 主管介入</label>
          <div class="seg" id="segR">
            <button data-v="0" class="on">主動建立共同目標（共同內群體）</button>
            <button data-v="1">未特別介入</button>
          </div>
        </div>
      </div>
      <div class="sim-out">
        <div class="flow-eq"><span class="x">X</span> ──▶ <span class="z">在條件 Z 下</span> ──▶ <span class="y">Y</span></div>
        <div class="outcome-box" id="simBox"></div>
      </div>
    </div>
  </div>`;
  const state={x:0,z:0,r:0};
  let touched=false;
  function wire(id,key){
    pane.querySelectorAll(`#${id} button`).forEach(b=>b.onclick=()=>{
      pane.querySelectorAll(`#${id} button`).forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); state[key]=+b.dataset.v; touched=true; compute();
    });
  }
  wire('segX','x'); wire('segZ','z'); wire('segR','r');
  function compute(){
    const box=pane.querySelector('#simBox');
    let good;
    if(state.x===0){ good = false; } // deep fault line: rarely good
    else { good = !(state.z===0 && state.r===1); } // cross-cutting: good unless high-stakes task with no leader follow-through
    let oh, od;
    if(state.x===0 && state.z===0){
      oh='🚫 產出 Y₁：嚴重分裂、創新受阻'; od='深層斷層線 × 高複雜度創新任務 → 子群體各自為政，無法整合多元觀點，創新停滯。';
    } else if(state.x===0 && state.z===1){
      oh='⚠️ 產出 Y：短期堪用，長期隱憂'; od='深層斷層線 × 低複雜度任務 → 短期效率尚可，但子群體間信任低、學習遲緩，遇到變化容易出問題。';
    } else if(state.x===1 && state.z===0 && state.r===0){
      oh='✅ 產出 Y₂：高凝聚、高創新'; od='交叉編組 × 高複雜度任務 × 主管建立共同目標 → 連結網絡＋共同內群體認同，多元觀點被整合，創新表現最佳。';
    } else if(state.x===1 && state.z===0 && state.r===1){
      oh='⚠️ 產出 Y：有潛力但未發揮'; od='交叉編組已打下基礎，但主管未建立共同目標牽引，創新潛力沒有被完全激發。';
    } else {
      oh='✅ 產出 Y₂：穩定順暢'; od='交叉編組降低分裂風險，加上任務本身複雜度低，執行平順、信任度高。';
    }
    box.className='outcome-box '+(good?'good':'bad');
    box.innerHTML=`<div class="oh">${oh}</div><div class="od">${od}</div>`;
    if(touched)markDone(curTP);
  }
  compute();
}

/* INTERACTIVE 5: OB engine */

/* ---- quiz ---- */
function renderQuiz(){
  const tp=TP[curTP], pane=document.querySelector('.pane[data-pane="quiz"]');
  const st=quizState[curTP];
  pane.innerHTML=`<div class="quiz">
    <div class="quiz-head">
      <span class="qt">📝 形成性評量 — ${tp.title}</span>
      <span class="score-pill" id="scorePill"></span>
    </div>
    <div id="qList"></div>
    <div class="quiz-actions">
      <button class="btn g student-only" id="submitQuiz">提交作答</button>
      <button class="btn y teacher-only" id="revealQuiz">顯示解答</button>
      <button class="btn sm" id="retryQuiz">重作</button>
    </div>
  </div>`;
  const ql=pane.querySelector('#qList');
  tp.quiz.forEach((q,qi)=>{
    const d=document.createElement('div'); d.className='q';
    d.innerHTML=`<div class="stem"><span class="qn">Q${qi+1}</span>${q.q}</div>
      <div class="opts">${q.opts.map((o,oi)=>`<button class="opt" data-q="${qi}" data-o="${oi}"><span class="mk">${'ABCD'[oi]}.</span>${o}</button>`).join('')}</div>
      <div class="q-exp"><b>解析：</b>${q.exp}</div>`;
    ql.appendChild(d);
  });
  ql.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{
    if(st.submitted)return;
    const qi=+o.dataset.q;
    st.answers[qi]=+o.dataset.o;
    ql.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(x=>x.classList.remove('sel'));
    o.classList.add('sel');
  });
  pane.querySelector('#submitQuiz').onclick=()=>gradeQuiz(false);
  pane.querySelector('#revealQuiz').onclick=()=>gradeQuiz(true);
  pane.querySelector('#retryQuiz').onclick=()=>{quizState[curTP]={answers:{},submitted:false};renderQuiz();};
  if(st.submitted)paintGraded(true);
  applyMode();
}
function gradeQuiz(reveal){
  const tp=TP[curTP], st=quizState[curTP];
  st.submitted=true; paintGraded(reveal);
  markDone(curTP);
}
function paintGraded(reveal){
  const tp=TP[curTP], st=quizState[curTP];
  const pane=document.querySelector('.pane[data-pane="quiz"]');
  let correct=0;
  tp.quiz.forEach((q,qi)=>{
    const chosen=st.answers[qi];
    pane.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(o=>{
      const oi=+o.dataset.o; o.classList.remove('sel');
      if(oi===q.a)o.classList.add('correct');
      if(chosen===oi && oi!==q.a)o.classList.add('incorrect');
    });
    pane.querySelectorAll('.q')[qi].querySelector('.q-exp').classList.add('show');
    if(chosen===q.a)correct++;
  });
  const pill=pane.querySelector('#scorePill');
  pill.classList.add('show');
  pill.textContent=`得分 ${correct} / ${tp.quiz.length}`;
  pill.style.borderColor = correct===tp.quiz.length?'var(--green)':'var(--orange)';
  pill.style.color = correct===tp.quiz.length?'var(--green)':'var(--orange)';
}

}

/* ============ TOOL: PICKER ============ */
const pickerPopup=document.getElementById('pickerPopup');
let drawn=[];
document.getElementById('btnPicker').onclick=()=>togglePopup('pickerPopup','btnPicker');
document.getElementById('resetPick').onclick=()=>{drawn=[];document.getElementById('pickHistory').textContent='';document.getElementById('pickResult').textContent='— ?? —';};
document.getElementById('drawBtn').onclick=()=>{
  let names=document.getElementById('nameList').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const noRep=document.getElementById('noRepeat').checked;
  let pool = noRep ? names.filter(n=>!drawn.includes(n)) : names;
  if(pool.length===0){document.getElementById('pickResult').textContent='已抽完！';return;}
  const res=document.getElementById('pickResult'); res.classList.add('rolling');
  let ticks=0; const iv=setInterval(()=>{
    res.textContent=pool[Math.floor(Math.random()*pool.length)];
    if(++ticks>14){
      clearInterval(iv); res.classList.remove('rolling');
      const pick=pool[Math.floor(Math.random()*pool.length)];
      res.textContent='🎯 '+pick;
      if(noRep){drawn.push(pick);document.getElementById('pickHistory').textContent='已抽：'+drawn.join('、');}
    }
  },60);
};

/* ============ TOOL: TIMER ============ */
let timerTotal=300, timerLeft=300, timerIv=null;
const timerDisp=document.getElementById('timerDisplay');
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function paintTimer(){
  timerDisp.textContent=fmt(timerLeft);
  timerDisp.classList.toggle('warn',timerLeft<=30&&timerLeft>0);
  timerDisp.classList.toggle('done',timerLeft===0);
}
document.getElementById('btnTimer').onclick=()=>togglePopup('timerPopup','btnTimer');
document.querySelectorAll('.preset').forEach(p=>p.onclick=()=>{timerTotal=timerLeft=+p.dataset.sec;clearInterval(timerIv);timerIv=null;paintTimer();});
document.getElementById('timerStart').onclick=()=>{
  if(timerIv)return;
  if(timerLeft===0){timerLeft=timerTotal;}
  timerIv=setInterval(()=>{
    if(timerLeft>0){timerLeft--;paintTimer();}
    else{clearInterval(timerIv);timerIv=null;paintTimer();try{beep();}catch(e){}}
  },1000);
};
document.getElementById('timerPause').onclick=()=>{clearInterval(timerIv);timerIv=null;};
document.getElementById('timerReset').onclick=()=>{clearInterval(timerIv);timerIv=null;timerLeft=timerTotal;paintTimer();};
function beep(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=880;
  g.gain.setValueAtTime(.25,ctx.currentTime);
  o.start();o.stop(ctx.currentTime+.5);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
}
paintTimer();

/* ============ POPUP TOGGLE + DRAG ============ */
function togglePopup(id,btnId){
  const p=document.getElementById(id), b=document.getElementById(btnId);
  const show=!p.classList.contains('show');
  p.classList.toggle('show',show); b.classList.toggle('active',show);
}
document.querySelectorAll('[data-close]').forEach(x=>x.onclick=()=>{
  const id=x.dataset.close; document.getElementById(id).classList.remove('show');
  const map={pickerPopup:'btnPicker',timerPopup:'btnTimer'};
  document.getElementById(map[id]).classList.remove('active');
});
document.querySelectorAll('[data-drag]').forEach(h=>{
  h.onmousedown=e=>{
    if(e.target.classList.contains('x'))return;
    const p=document.getElementById(h.dataset.drag);
    const r=p.getBoundingClientRect();
    const offX=e.clientX-r.left, offY=e.clientY-r.top;
    p.style.right='auto'; p.style.bottom='auto'; p.style.transform='none';
    p.style.left=r.left+'px'; p.style.top=r.top+'px';
    function mv(ev){p.style.left=(ev.clientX-offX)+'px';p.style.top=(ev.clientY-offY)+'px';}
    function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  };
});

/* ============ TOOL: PEN ============ */
const canvas=document.getElementById('penCanvas'), pctx=canvas.getContext('2d');
const palette=document.getElementById('penPalette');
let penOn=false, penColor='#f4f1e6', eraser=false, drawing=false;
function sizeCanvas(){const b=document.querySelector('.board').getBoundingClientRect();canvas.width=b.width;canvas.height=b.height;}
document.getElementById('btnPen').onclick=()=>{
  penOn=!penOn;
  document.getElementById('btnPen').classList.toggle('active',penOn);
  if(penOn){sizeCanvas();canvas.classList.add('show');palette.classList.add('show');}
  else{canvas.classList.remove('show');palette.classList.remove('show');}
};
document.getElementById('penExit').onclick=()=>document.getElementById('btnPen').onclick();
document.getElementById('penClear').onclick=()=>pctx.clearRect(0,0,canvas.width,canvas.height);
document.querySelectorAll('.pen-color').forEach(c=>c.onclick=()=>{
  penColor=c.dataset.color; eraser=false;
  document.getElementById('penEraser').classList.remove('on');
  document.querySelectorAll('.pen-color').forEach(x=>x.classList.toggle('sel',x===c));
});
document.getElementById('penEraser').onclick=()=>{eraser=!eraser;document.getElementById('penEraser').classList.toggle('on',eraser);};
function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function start(e){if(!penOn)return;drawing=true;const p=pos(e);pctx.beginPath();pctx.moveTo(p.x,p.y);e.preventDefault();}
function move(e){
  if(!drawing)return;const p=pos(e);
  pctx.lineCap='round';pctx.lineJoin='round';
  if(eraser){pctx.globalCompositeOperation='destination-out';pctx.lineWidth=26;}
  else{pctx.globalCompositeOperation='source-over';pctx.strokeStyle=penColor;pctx.lineWidth=3.2;pctx.shadowColor=penColor;pctx.shadowBlur=1.2;}
  pctx.lineTo(p.x,p.y);pctx.stroke();e.preventDefault();
}
function end(){drawing=false;}
canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
canvas.addEventListener('touchstart',start);canvas.addEventListener('touchmove',move);canvas.addEventListener('touchend',end);
window.addEventListener('resize',()=>{if(penOn){const img=pctx.getImageData(0,0,canvas.width,canvas.height);sizeCanvas();pctx.putImageData(img,0,0);}});

/* ============ INIT ============ */
selectTP(0);
applyMode();
</script>
